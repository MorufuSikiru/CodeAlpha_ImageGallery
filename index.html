<!doctype html>
<html
  lang="en"
>
  <head>
    <meta
      charset="UTF-8"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>
      PrimeLead
      Image
      Gallery
    </title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <header>
      <div
        class="logo"
      >
        <div
          class="logo-image"
        >
          <img
            src="./gallaryimages/brandlogo.png"
            alt=""
          />
        </div>
      </div>

      <div>
        <p
          class="subtitle"
        >
          Welcom
          to
          PrimeLead
          Gallary
      
      </div>
    </header>

    <div
      class="filter-bar"
      id="filterBar"
    ></div>

    <div
      class="gallery-info"
    >
      <span
        id="countDisplay"
        class="count-badge"
        >12
        photos</span
      >
      <span
        id="categoryDisplay"
        style="
          font-size: 0.82rem;
        "
        >All
        Categories</span
      >
    </div>

    <div
      class="gallery-grid"
      id="galleryGrid"
    ></div>

    <!-- Lightbox -->
    <div
      class="lightbox"
      id="lightbox"
    >
      <button
        class="lb-nav lb-prev"
        id="lbPrev"
        aria-label="Previous"
      >
        &#8592;
      </button>
      <button
        class="lb-nav lb-next"
        id="lbNext"
        aria-label="Next"
      >
        &#8594;
      </button>
      <div
        class="lightbox-inner"
      >
        <button
          class="lightbox-close"
          id="lbClose"
          aria-label="Close"
        >
          &times;
        </button>
        <div
          class="lightbox-img-wrap"
        >
          <img
            id="lbImg"
            src=""
            alt=""
          />
          <span
            class="lb-counter"
            id="lbCounter"
          ></span>
        </div>
        <div
          class="lightbox-caption"
        >
          <h3
            id="lbTitle"
          ></h3>
          <p
            id="lbMeta"
          ></p>
        </div>
      </div>
    </div>
 </p>
        <p class="visual">A curated visual gallery by PrimeLead</p>
 <footer>
      <span class="footer-logo"><img src="./gallaryimages/brandlogo.png" alt=""></span>
      <span class="footer-copy">© 2026 Morufu Sikiru Kehinde · PrimeLeads</span>
      <div class="footer-links">
        <a href="https://github.com/MorufuSikiru" target="_blank">GitHub</a>
        <a href="https://x.com/s_morufu" target="_blank">Twitter</a>
        <a href="mailto:sikirumorufu45@gmail.com">Email</a>
      </div>
      
    </footer>

  </body>
  <script src="./script.js"></script>
</html>
